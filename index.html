/* =============================
4 DAG/NATT
============================= */
function getSunTimes(lat, lon, date){

 const rad = Math.PI / 180;

 const day = Math.floor(
  (Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()) -
   Date.UTC(date.getFullYear(), 0, 0)) / 86400000
 );

 const lngHour = lon / 15;

 function calc(isSunrise){

  const t = day + ((isSunrise ? 6 : 18) - lngHour) / 24;

  const M = (0.9856 * t) - 3.289;

  let L = M
   + 1.916 * Math.sin(M * rad)
   + 0.020 * Math.sin(2 * M * rad)
   + 282.634;

  L = (L + 360) % 360;

  let RA = Math.atan(0.91764 * Math.tan(L * rad)) / rad;
  RA = (RA + 360) % 360;
  RA = RA / 15;

  const sinDec = 0.39782 * Math.sin(L * rad);
  const cosDec = Math.cos(Math.asin(sinDec));

  const cosH = (
   Math.cos(90.833 * rad) -
   (sinDec * Math.sin(lat * rad))
  ) / (cosDec * Math.cos(lat * rad));

  if (cosH > 1) return null;   // alltid natt
  if (cosH < -1) return null;  // alltid dag

  let H = isSunrise
   ? 360 - Math.acos(cosH) / rad
   : Math.acos(cosH) / rad;

  H = H / 15;

  const T = H + RA - (0.06571 * t) - 6.622;

  return (T - lngHour) % 24;
 }

 return {
  sunrise: calc(true),
  sunset: calc(false)
 };
}

function getDayNight(date,pos){

  if(!date || !pos) return "day";

  const lat = pos.lat;
  const lon = pos.lng;

  const sun = getSunTimes(lat, lon, date);

  // ✅ polarnatt / midnattssol
  if(sun.sunrise === null || sun.sunset === null){
    return sun.sunrise === null ? "night" : "day";
  }

  // lokal tid (inkl sommertid)
  const hours = date.getHours() + date.getMinutes()/60;

  const offset = -date.getTimezoneOffset() / 60;

  let sunriseLocal = sun.sunrise + offset;
  let sunsetLocal = sun.sunset + offset;

  // normaliser
  if (sunriseLocal < 0) sunriseLocal += 24;
  if (sunriseLocal > 24) sunriseLocal -= 24;

  if (sunsetLocal < 0) sunsetLocal += 24;
  if (sunsetLocal > 24) sunsetLocal -= 24;

  return (hours >= sunriseLocal && hours <= sunsetLocal)
    ? "day"
    : "night";
}
/* =============================
5 WEATHER
============================= */
      
async function getHistoricalWeather(lat, lon, time){

  const url = `/api/frost?time=${time.toISOString()}`;

  try {
    const res = await fetch(url);
    const json = await res.json();

    																				

    if(json.data && json.data.length > 0){

      const observations = json.data[0].observations;

      let result = {};

      for(const item of observations){
        result[item.elementId] = item.value;
      }

      																				

      return {
        air_temperature: result.air_temperature,
        wind_speed: result.wind_speed,
        wind_from_direction: result.wind_from_direction
      };
    }

  } catch(e){
    																				
    return null;
  }
}

	
async function updateWeather(){

 const pos=marker.getLatLng();
 const url=`https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=${pos.lat}&lon=${pos.lng}`;

 try{
  const res=await fetch(url,{headers:{"User-Agent":"CBRN-App"}});
  const data=await res.json();
  const now=data.properties.timeseries[0].data.instant.details;
  
  t0data = null;
  ``

  																					
	 
  // ===== Hente historiske værdata =====


  // ===== T0 LOGIKK (fortid vs fremtid) =====
  const t0time = t0.value ? new Date(t0.value) : null;
  const nowTime = new Date();

  ``

  if(t0time){

    if(t0time < nowTime){

      // 🔥 HISTORISK DATA
      const hist = await getHistoricalWeather(pos.lat, pos.lng, t0time);

      if(hist){
        t0data = hist;
      }
	} else {

      // 🔥 FREMTID (forecast)
      for(const ts of data.properties.timeseries){

          const tsTime = new Date(ts.time);

          if(tsTime >= t0time){
            t0data = ts.data.instant.details;
            break;
          }
      }
    }
  }	 
	 
  if(!marker) return;temp_now.innerHTML = now.air_temperature+" °C";
  
  wind_now.innerHTML =
   windArrow(now.wind_from_direction + 180)+" "+
   "fra "+windText(now.wind_from_direction)+" "+
   now.wind_speed.toFixed(1)+" m/s";
   
  lastWindDir = now.wind_from_direction;
  
  if(dynamicPlume){
   map.removeLayer(dynamicPlume);
  }
		 
  // fallback hvis T=0 ikke finnes
  if(!t0data && !t0.value){
    t0data = data.properties.timeseries[0].data.instant.details;
  }
  // fallback hvis ingenting ble funnet
  if(!t0data && t0time){
   																				

    for(const ts of data.properties.timeseries){
      const tsTime = new Date(ts.time);

      if(tsTime >= t0time){
        t0data = ts.data.instant.details;
        break;
      }
    }
  }
 
  // oppdater vind
  if(t0data && t0data.wind_from_direction !== undefined){
     t0WindDir = t0data.wind_from_direction;
  }
	  
  if(t0.value){
   const windTrack = [];

  // start med T0
  windTrack.push({
    dir: t0data.wind_from_direction,
    speed: t0data.wind_speed
  });

  // legg til noen fremtidspunkter (forecast)
  for (const ts of data.properties.timeseries){
  
    const tsTime = new Date(ts.time);

    if (tsTime > nowTime){

      windTrack.push({
        dir: ts.data.instant.details.wind_from_direction,
        speed: ts.data.instant.details.wind_speed
      });
    }

    if (windTrack.length >= 6) break; // begrens lengde
  }
	  
																						console.log("windTrack:", windTrack)
	  
  dynamicPlume = createDynamicPlume(
     marker.getLatLng(),
     Number(hot.value),
     windTrack,
     t0WindDir
  );

  if(dynamicPlume){
     map.addLayer(dynamicPlume);
  }

  } else {

  // fjern plume hvis T0 ikke er satt
  if(dynamicPlume){
    map.removeLayer(dynamicPlume);
    dynamicPlume = null;
  }
}
	 
 				 																		
	 
  //UI (uendret)
  temp_t0.innerHTML = t0data.air_temperature ?? "-";

  wind_t0.innerHTML =
    t0data.wind_from_direction != null
      ? windArrow(t0data.wind_from_direction + 180)+" "+
        "fra "+windText(t0data.wind_from_direction)+" "+
        (t0data.wind_speed ?? 0).toFixed(1)+" m/s"
      : "-";
	 
  updateMap();

}catch(e){
  																						
  dynamicPlume = null;
}
}  

	
function windText(d){
 const dirs=[
"N","NNØ","NØ","ØNØ",
  "Ø","ØSØ","SØ","SSØ",
  "S","SSV","SV","VSV",
  "V","VNV","NV","NNV"
];
 return dirs[Math.round(d/22.5)%16];
}

	
function windArrow(deg){
  return `
  <span style="display:inline-block; transform: rotate(${deg}deg);">
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path d="M12 2 L12 20 M12 2 L6 8 M12 2 L18 8"
        stroke="black"
        stroke-width="2"
        fill="none"/>
    </svg>
  </span>`;
}

function updateElapsed(){

 const val=t0.value;
 if(!val){
   elapsed.innerHTML="";
   return;
 }

 const start=new Date(val);
 const now=new Date();

 let diff=Math.floor((now-start)/1000);

 const days=Math.floor(diff/86400);
 diff%=86400;

 const h=Math.floor(diff/3600);
 diff%=3600;

 const m=Math.floor(diff/60);
 const s=diff%60;

 if(days>0){
   const dayText = days===1?"dag":"dager";
   elapsed.innerHTML = `Tid siden hendelse: ${days} ${dayText}, ${h}t ${m}m ${s}s`;
 } else {
   elapsed.innerHTML = `Tid siden hendelse: ${h}t ${m}m ${s}s`;
 }
}

10 MAP
============================= */
function placeIncident(pos){

 marker && map.removeLayer(marker);
 hotCircle && map.removeLayer(hotCircle);
 warmCircle && map.removeLayer(warmCircle);

 marker=L.marker(pos,{icon}).addTo(map);

 coords.innerHTML =
  "Ulykkessted: "+pos.lat.toFixed(5)+"° N, "+pos.lng.toFixed(5)+"° Ø";

 updateMap();
 updateWeather();
 updateNow();
 
// ✅ oppdater dag/natt med en gang
if(t0.value){
  dn_t0.innerHTML =
    getDayNight(new Date(t0.value), pos)==="day"?"☀️ Dag":"🌙 Natt";
}

// ✅ oppdater nå-visning med en gang
dn_now.innerHTML =
  getDayNight(new Date(), pos)==="day"?"☀️ Dag":"🌙 Natt";

}

function updateMap(){

 if(!marker) return;

 const pos = marker.getLatLng();

 const hotR = +hot.value;
 const warmR = +warm.value;

 // fjern gamle
 hotCircle && map.removeLayer(hotCircle);
 warmCircle && map.removeLayer(warmCircle);
 plume && map.removeLayer(plume);

 // 🔴 HOTZONE (uendret)
 hotCircle = L.circle(pos,{
   radius: hotR,
   color: "red",
   fillColor: "red",
   fillOpacity: 0.3
 }).addTo(map);

 // 🟠 YTRE RING (ny stil)
 warmCircle = L.circle(pos,{
   radius: warmR,
   color: "red",
   dashArray: "6,6",
   fillOpacity: 0
 }).addTo(map);

 let windDir = 0;

 if(t0data && t0data.wind_from_direction !== undefined){
   windDir = t0data.wind_from_direction + 180;
 }
 ``
																							
	
 // ✳️ lag plume


// ✅ vis kun plumer hvis T0 er satt
if(t0.value){

  plume = createPlume(pos, hotR, warmR, windDir).addTo(map);

  if(dynamicPlume && dynamicPlume.bringToBack){
    dynamicPlume.addTo(map);
    dynamicPlume.bringToBack();
  }

}

// sørg for at hotzone ligger øverst
if(hotCircle){
  hotCircle.bringToFront();
}
}


function getStability(windSpeed){
  if(windSpeed < 2) return "A";
  if(windSpeed < 4) return "B";
  if(windSpeed < 6) return "C";
  return "D";
}


function getSpreadFactor(stability){
  return {
    "A": 2.0,
    "B": 1.6,
    "C": 1.3,
    "D": 1.0
  }[stability] || 1.0;
}

	
function createPlume(center, hotR, warmR, windDeg){

  const lat = center.lat;
  const lon = center.lng;

  const rad = Math.PI/180;
  const steps = 20;

  const points = [];

  const wind = windDeg * rad;

  // ✅ halvsirkel
  for(let i = 0; i <= steps; i++){
    const a = wind - Math.PI/2 + (i/steps)*Math.PI;
    const p = destination(lat, lon, a, hotR);
    points.push([p.lat, p.lng]);
  }

  // ✅ ytterbue
  const outer = [];
  for(let i = 0; i <= steps; i++){
    const a = wind - 0.5 + (i/steps)*1.0;
    const p = destination(lat, lon, a, warmR);
    outer.push([p.lat, p.lng]);
  }


  for(let i = outer.length-1; i >= 0; i--){
    points.push(outer[i]);
  }
		
  return L.polygon(points,{
    color:"orange",
    fillColor:"orange",
    fillOpacity:0.3
  });
}

	
function destination(lat, lon, angle, dist){

 const R = 6378137;

 const newLat = lat + (dist * Math.cos(angle)) / R * (180/Math.PI);
 const newLon = lon + (dist * Math.sin(angle)) / R * (180/Math.PI) / Math.cos(lat*Math.PI/180);

 return {lat:newLat, lng:newLon};
}

	
function createDynamicPlume(center, hotR, timeseries, windStart){

  if(windStart === undefined || windStart === null){
  console.warn("Ingen vindretning gitt");
  return null;
}
``
	
  const rad = Math.PI/180;
  const steps = 20;
  
  // enkel retning

  const dir = windStart * rad;


  // to punkter fremover
  const step = 1500; // meter

  let current = center;
  
  
   // cap (den du fikk til tidligere)
  
  let cap = [];

  for(let i=0;i<=steps;i++){
    const a = dir - Math.PI/2 +	(i/steps)*Math.PI;

    const p = destination(center.lat, center.lng, a, hotR);
    cap.push([p.lat,p.lng]);
  }
	
  if(!cap || cap.length === 0){
    																								
    return null;
  }
  
  const startLeft = cap[0];
  const startRight = cap[cap.length - 1];

  if(!startLeft || !startRight){
    																								
    return null;
  }
  
  cap.reverse()
	
  // 🔥 startpunkter direkte fra cap
  let left = { lat: cap[0][0], lng: cap[0][1] };
  let right = { lat: cap[cap.length - 1][0], lng: cap[cap.length - 1][1] };

  const leftEdge = [];
  const rightEdge = [];

  let currentCenter = center;
  let currentLeft = left;
  let currentRight = right;

  for (let i = 0; i < timeseries.length; i++) {

  const step = timeseries[i];

  for (let i = 0; i < timeseries.length; i++) {

  const step = timeseries[i];

  // ✅ FRA → TIL (kun her!)
  const stepDir = (step.dir + 180) * Math.PI / 180;

  // fremdrift
  const dist = Math.max(300, step.speed * 600);

  // flytt center
  currentCenter = destination(
    currentCenter.lat,
    currentCenter.lng,
    stepDir,
    dist
  );

  // 🔥 beregn forrige retning
  const prevDir = i === 0
    ? dir
    : (timeseries[i-1].dir + 180) * Math.PI / 180;

  let delta = stepDir - prevDir;

  // normaliser
  if (delta > Math.PI) delta -= 2*Math.PI;
  if (delta < -Math.PI) delta += 2*Math.PI;

  const turn = Math.abs(delta);

  // 🔥 beregn bredde fra forrige steg
  const dx = currentLeft.lat - currentRight.lat;
  const dy = currentLeft.lng - currentRight.lng;
  const prevWidth = Math.sqrt(dx*dx + dy*dy);

 // beregn nåværende bredde (før svingen)
const dx = currentLeft.lat - currentRight.lat;
const dy = currentLeft.lng - currentRight.lng;
const width = Math.sqrt(dx*dx + dy*dy);

// flytt center først (alltid)
currentCenter = destination(
  currentCenter.lat,
  currentCenter.lng,
  stepDir,
  dist
);

// ---------- LITEN ENDRING → NORMAL ----------
if (turn < 0.2) {

  const half = width / 2;

  const leftDir = stepDir - Math.PI/2;
  const rightDir = stepDir + Math.PI/2;

  currentLeft = destination(currentCenter.lat, currentCenter.lng, leftDir, half);
  currentRight = destination(currentCenter.lat, currentCenter.lng, rightDir, half);

  leftEdge.push([currentLeft.lat, currentLeft.lng]);
  rightEdge.push([currentRight.lat, currentRight.lng]);

}

// ---------- STOR ENDRING → KNEKK + BUE ----------
else {

  // avgjør hvilken side som er inner/ytter
  const turningLeft = delta > 0;

  const inner = turningLeft ? "left" : "right";

  const segments = 6;

  // 🔥 1. INNERSIDE → KNEKK (kun ett punkt)
  if (inner === "left") {

    const leftDir = stepDir - Math.PI/2;

    currentLeft = destination(currentCenter.lat, currentCenter.lng, leftDir, width/2);

    leftEdge.push([currentLeft.lat, currentLeft.lng]);

  } else {

    const rightDir = stepDir + Math.PI/2;

    currentRight = destination(currentCenter.lat, currentCenter.lng, rightDir, width/2);

    rightEdge.push([currentRight.lat, currentRight.lng]);
  }

  // 🔥 2. YTTERSIDE → BUE
  for (let s = 1; s <= segments; s++) {

    const interpDir =
      prevDir + delta * (s / segments);

    const outerDir = inner === "left"
      ? interpDir + Math.PI/2
      : interpDir - Math.PI/2;

    const point = destination(
      currentCenter.lat,
      currentCenter.lng,
      outerDir,
      width
    );

    if (inner === "left") {
      rightEdge.push([point.lat, point.lng]);
    } else {
      leftEdge.push([point.lat, point.lng]);
    }
  }
}
}
}
																					

  return L.polygon([
    ...cap,
    ...rightEdge,
	...leftEdge.reverse()
   
  ],{
    color:"#888",
    weight:1.5,
    dashArray:"4,8",
    fill:true,
    fillOpacity:0.15,
    fillColor:"#666"
  });
}

      marker.getLatLng(),
      Number(hot.value),
      [],            // vi bruker ikke timeseries her
      t0WindDir + 180
    );

    if(dynamicPlume){
      map.addLayer(dynamicPlume);
    }
  }
	
  updateWeather();
};

function newLocation(){ locked=false; }

/* =============================
INTERVALS
============================= */
setInterval(updateNow,60000);
setInterval(updateWeather,600000);
setInterval(updateElapsed,1000);




updateNow();  // ✅ kjør én gang ved start

</script>
