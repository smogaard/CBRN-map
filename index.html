/* =============================
4 DAG/NATT
============================= */
function getSunTimes(lat, lon, date){

 const rad = Math.PI / 180;

 const day = Math.floor(
  (Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()) -
   Date.UTC(date.getFullYear(), 0, 0)) / 86400000
 );

 const lngHour = lon / 15;

 function calc(isSunrise){

  const t = day + ((isSunrise ? 6 : 18) - lngHour) / 24;

  const M = (0.9856 * t) - 3.289;

  let L = M
   + 1.916 * Math.sin(M * rad)
   + 0.020 * Math.sin(2 * M * rad)
   + 282.634;

  L = (L + 360) % 360;

  let RA = Math.atan(0.91764 * Math.tan(L * rad)) / rad;
  RA = (RA + 360) % 360;
  RA = RA / 15;

  const sinDec = 0.39782 * Math.sin(L * rad);
  const cosDec = Math.cos(Math.asin(sinDec));

  const cosH = (
   Math.cos(90.833 * rad) -
   (sinDec * Math.sin(lat * rad))
  ) / (cosDec * Math.cos(lat * rad));

  if (cosH > 1) return null;   // alltid natt
  if (cosH < -1) return null;  // alltid dag

  let H = isSunrise
   ? 360 - Math.acos(cosH) / rad
   : Math.acos(cosH) / rad;

  H = H / 15;

  const T = H + RA - (0.06571 * t) - 6.622;

  return (T - lngHour) % 24;
 }

 return {
  sunrise: calc(true),
  sunset: calc(false)
 };
}

function getDayNight(date,pos){

  if(!date || !pos) return "day";

  const lat = pos.lat;
  const lon = pos.lng;

  const sun = getSunTimes(lat, lon, date);

  // ✅ polarnatt / midnattssol
  if(sun.sunrise === null || sun.sunset === null){
    return sun.sunrise === null ? "night" : "day";
  }

  // lokal tid (inkl sommertid)
  const hours = date.getHours() + date.getMinutes()/60;

  const offset = -date.getTimezoneOffset() / 60;

  let sunriseLocal = sun.sunrise + offset;
  let sunsetLocal = sun.sunset + offset;

  // normaliser
  if (sunriseLocal < 0) sunriseLocal += 24;
  if (sunriseLocal > 24) sunriseLocal -= 24;

  if (sunsetLocal < 0) sunsetLocal += 24;
  if (sunsetLocal > 24) sunsetLocal -= 24;

  return (hours >= sunriseLocal && hours <= sunsetLocal)
    ? "day"
    : "night";
}

async function getHistoricalWeather(lat, lon, time){

  const url = `/api/frost?time=${time.toISOString()}`;

  try {
    const res = await fetch(url);
    const json = await res.json();

    																				

    if(json.data && json.data.length > 0){

      const observations = json.data[0].observations;

      let result = {};

      for(const item of observations){
        result[item.elementId] = item.value;
      }

      																				

      return {
        air_temperature: result.air_temperature,
        wind_speed: result.wind_speed,
        wind_from_direction: result.wind_from_direction
      };
    }

  } catch(e){
    																				
    return null;
  }
}

	
async function updateWeather(){

 const pos=marker.getLatLng();
 const url=`https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=${pos.lat}&lon=${pos.lng}`;

 try{
  const res=await fetch(url,{headers:{"User-Agent":"CBRN-App"}});
  const data=await res.json();
  const now=data.properties.timeseries[0].data.instant.details;
  
  t0data = null;
   																					
	 
  // ===== Hente historiske værdata =====


  // ===== T0 LOGIKK (fortid vs fremtid) =====

  const nowTime = new Date();

  
  if(t0time){

    if(t0time < nowTime){

      // 🔥 HISTORISK DATA
      const hist = await getHistoricalWeather(pos.lat, pos.lng, t0time);

      if(hist){
        t0data = hist;
      }
	} else {

      // 🔥 FREMTID (forecast)
      for(const ts of data.properties.timeseries){

          const tsTime = new Date(ts.time);

          if(tsTime >= t0time){
            t0data = ts.data.instant.details;
            break;
          }

    }

  if(!marker) return;temp_now.innerHTML = now.air_temperature+" °C";
  
  wind_now.innerHTML =
   windArrow(now.wind_from_direction + 180)+" "+
   "fra "+windText(now.wind_from_direction)+" "+
   now.wind_speed.toFixed(1)+" m/s";
   
  lastWindDir = now.wind_from_direction;
  
  if(dynamicPlume){
   map.removeLayer(dynamicPlume);
  }
		 
  // fallback hvis t=0 ikke er satt
  if (!t0.value) {
    temp_t0.innerHTML = "-";
    wind_t0.innerHTML = "-";
  }

  // fallback hvis ingenting ble funnet
  if(!t0data && t0time){
   																				

    for(const ts of data.properties.timeseries){
      const tsTime = new Date(ts.time);

      if(tsTime >= t0time){
        t0data = ts.data.instant.details;
        break;
      }
    }
  }
	 
  const elapsedHours = t0time
    ? Math.max(1, (nowTime - t0time) / (1000 * 60 * 60))
    : 1;

  // oppdater vind
  if(t0data && t0data.wind_from_direction !== undefined){
     t0WindDir = t0data.wind_from_direction;
  }
	  
  if(t0.value){
 
const windTrack = [];

for (const ts of data.properties.timeseries){

  const tsTime = new Date(ts.time);

  if (tsTime >= t0time && tsTime <= nowTime){

    windTrack.push({
      dir: ts.data.instant.details.wind_from_direction,
      speed: ts.data.instant.details.wind_speed,
      time: ts.time
    });
  }

  if (windTrack.length >= Math.ceil(elapsedHours * 2)) break;
}

// ✅ legg til T0 én gang (ETTER loopen)
windTrack.unshift({
  dir: t0data.wind_from_direction,
  speed: t0data.wind_speed,
  time: t0time.toISOString()
});


																						console.log("windTrack:", windTrack)
	  
  dynamicPlume = createDynamicPlume(
     marker.getLatLng(),
     Number(hot.value),
     windTrack,
     t0WindDir
  );

  if(dynamicPlume){
     map.addLayer(dynamicPlume);
  }

  } else {

  // fjern plume hvis T0 ikke er satt
  if(dynamicPlume){
    map.removeLayer(dynamicPlume);
    dynamicPlume = null;
  }
}
	 
 				 																		
	 
  //UI (uendret)
  temp_t0.innerHTML = t0data.air_temperature ?? "-";

  wind_t0.innerHTML =
    t0data.wind_from_direction != null
      ? windArrow(t0data.wind_from_direction + 180)+" "+
        "fra "+windText(t0data.wind_from_direction)+" "+
        (t0data.wind_speed ?? 0).toFixed(1)+" m/s"
      : "-";
	 
  updateMap();

}catch(e){
  																						
  dynamicPlume = null;
}
}

   elapsed.innerHTML = `Tid siden hendelse: ${days} ${dayText}, ${h}t ${m}m ${s}s`;

}

function updateMap(){

 }).addTo(map);

 let windDir = 0;

 if(t0data && t0data.wind_from_direction !== undefined){
   windDir = t0data.wind_from_direction + 180;
 }
 
																							
	
 // ✳️ lag plume


// ✅ vis kun plumer hvis T0 er satt
if(t0.value){

  plume = createPlume(pos, hotR, warmR, windDir).addTo(map);

  if(dynamicPlume && dynamicPlume.bringToBack){
    dynamicPlume.addTo(map);
    dynamicPlume.bringToBack();
  }

}

// ✅ Nå-plume (skal alltid vises hvis vi har vinddata)
if (lastWindDir !== undefined && marker) {

  const nowWindDeg = lastWindDir + 180;

  plumeNow = createStaticNowPlume(
    pos,
    hotR,
    warmR,
    nowWindDeg
  ).addTo(map);

  plumeNow.bringToBack();
}

	
if (marker) {

  createFlowLayer(pos).then(layer => {

    }

  }).catch(e => {

  });

}

	
// sørg for at hotzone ligger øverst
if(hotCircle){
  hotCircle.bringToFront();
}
}


function getStability(windSpeed){
  if(windSpeed < 2) return "A";
  if(windSpeed < 4) return "B";
  if(windSpeed < 6) return "C";
  return "D";
}


function getSpreadFactor(stability){
  return {
    "A": 2.0,
    "B": 1.6,
    "C": 1.3,
    "D": 1.0
  }[stability] || 1.0;
}

	
function createPlume(center, hotR, warmR, windDeg){

  const lat = center.lat;
  const lon = center.lng;

  const rad = Math.PI/180;
  const steps = 20;

  const points = [];

  const wind = windDeg * rad;

  // ✅ halvsirkel
  for(let i = 0; i <= steps; i++){
    const a = wind - Math.PI/2 + (i/steps)*Math.PI;
    const p = destination(lat, lon, a, hotR);
    points.push([p.lat, p.lng]);
  }

  // ✅ ytterbue
  const outer = [];
  for(let i = 0; i <= steps; i++){
    const a = wind - 0.5 + (i/steps)*1.0;
    const p = destination(lat, lon, a, warmR);
    outer.push([p.lat, p.lng]);
  }


  for(let i = outer.length-1; i >= 0; i--){
    points.push(outer[i]);
  }
		
  return L.polygon(points,{
    color:"orange",
    fillColor:"orange",
    fillOpacity:0.3
  });
}

	
function destination(lat, lon, angle, dist){

 const R = 6378137;

 const newLat = lat + (dist * Math.cos(angle)) / R * (180/Math.PI);
 const newLon = lon + (dist * Math.sin(angle)) / R * (180/Math.PI) / Math.cos(lat*Math.PI/180);

 return {lat:newLat, lng:newLon};
}

	
function createDynamicPlume(center, hotR, timeseries, windStart){

  if(windStart === undefined || windStart === null){
  console.warn("Ingen vindretning gitt");
  return null;
}

	
  const rad = Math.PI/180;
  const steps = 20;
  
  // enkel retning

  const dir = windStart * rad;


  // to punkter fremover
  const step = 1500; // meter

   
  
   // cap (den du fikk til tidligere)
  
  let cap = [];

  for(let i=0;i<=steps;i++){
    const a = dir - Math.PI/2 +	(i/steps)*Math.PI;

    const p = destination(center.lat, center.lng, a, hotR);
    cap.push([p.lat,p.lng]);
  }
	
  if(!cap || cap.length === 0){
    																								
    return null;
  }
  
  const startLeft = cap[0];
  const startRight = cap[cap.length - 1];

  if(!startLeft || !startRight){
    																								
    return null;
  }
  
  cap.reverse()
	
  // 🔥 startpunkter direkte fra cap
  let left = { lat: cap[0][0], lng: cap[0][1] };
  let right = { lat: cap[cap.length - 1][0], lng: cap[cap.length - 1][1] };

  const leftEdge = [];
  const rightEdge = [];

  let currentCenter = center;
  let currentLeft = left;
  let currentRight = right;

  let totalTime = 0;

 for (let i = 0; i < timeseries.length; i++) {

  const step = timeseries[i];

  // ✅ konverter FRA → TIL
  const stepDir = (step.dir + 180) * Math.PI / 180;

  
  let prevDir = stepDir;

  if (i > 0) {
    prevDir = (timeseries[i-1].dir + 180) * Math.PI / 180;
  }

  // beregn retningsendring
  let delta = stepDir - prevDir;

  // normaliser
  if (delta > Math.PI) delta -= 2*Math.PI;
  if (delta < -Math.PI) delta += 2*Math.PI;

  const turn = Math.abs(delta);

  
  // ✅ fremdrift
  // ✅ beregn tidsforskjell mellom punkter

let dt = 1800;

if (i > 0) {
  const prevTime = new Date(timeseries[i-1].time);
  const currTime = new Date(timeseries[i].time);
  dt = (currTime - prevTime) / 1000;
}

  totalTime += dt;
	 
  // ✅ distanse = fart * tid
  const dist = step.speed * dt;

  if (i === 0) {

    // ✅ flytt center frem FØR første snitt
    currentCenter = destination(
      currentCenter.lat,
      currentCenter.lng,
      stepDir,
      dist
    );

    const baseDir = stepDir;

    const leftDir = baseDir - Math.PI / 2;
    const rightDir = baseDir + Math.PI / 2;

    const width = hotR + Math.sqrt(dt) * 20;

    const leftPoint = destination(currentCenter.lat, currentCenter.lng, leftDir, width);
    const rightPoint = destination(currentCenter.lat, currentCenter.lng, rightDir, width);

    currentLeft = leftPoint;
    currentRight = rightPoint;

    leftEdge.push([leftPoint.lat, leftPoint.lng]);
    rightEdge.push([rightPoint.lat, rightPoint.lng]);

  continue;

  }
  // ✅ NORMAL CASE (i > 0)

  // flytt center
  currentCenter = destination(
    currentCenter.lat,
    currentCenter.lng,
    stepDir,
    dist
  );

  // bredde
  const width = hotR + Math.sqrt(totalTime) * 20;

  // retning ut til sidene
  const leftDir = stepDir - Math.PI / 2;
  const rightDir = stepDir + Math.PI / 2;

  
  // lagre gamle først 
  const prevLeftPt = { ...currentLeft };
  const prevRightPt = { ...currentRight };

  // beregn nye punkter
  const newLeft = destination(currentCenter.lat, currentCenter.lng, leftDir, width);
  const newRight = destination(currentCenter.lat, currentCenter.lng, rightDir, width);

 
// ✅ bue basert på prev*
if (turn > 0.2) {

  const segments = 10;
  const turningLeft = delta < 0;

  const pivot = turningLeft ? prevLeftPt : prevRightPt;
  const startPoint = turningLeft ? prevRightPt : prevLeftPt;

  const latFactor = Math.cos(pivot.lat * Math.PI / 180);

  const dx0 = (startPoint.lng - pivot.lng) * latFactor;
  const dy0 = startPoint.lat - pivot.lat;

  for (let s = 1; s <= segments; s++) {

    const t = s / segments;

    const angle = -delta * t;

    const dx =
      dx0 * Math.cos(angle) - dy0 * Math.sin(angle);

    const dy =
      dx0 * Math.sin(angle) + dy0 * Math.cos(angle);

    const lng = pivot.lng + dx / latFactor;
    const lat = pivot.lat + dy;

    if (turningLeft) {
      rightEdge.push([lat, lng]);
    } else {
      leftEdge.push([lat, lng]);
    }
  }
}

// ✅ SÅ oppdaterer du
currentLeft = newLeft;
currentRight = newRight;

leftEdge.push([newLeft.lat, newLeft.lng]);
rightEdge.push([newRight.lat, newRight.lng]);
}

	
  // Lage front på plumen	
  const frontRight = rightEdge[rightEdge.length - 1];
  const frontLeft = leftEdge[leftEdge.length - 1];
  const frontPoints = [];

  const frontSteps = 10;

  // retning langs front (fra left → right)
  const dx = frontRight[0] - frontLeft[0];
  const dy = frontRight[1] - frontLeft[1];

  const frontAngle = Math.atan2(dy, dx);
  const centerDir = frontAngle - Math.PI / 2;

  const dx_end = frontRight[0] - frontLeft[0];
  const dy_end = frontRight[1] - frontLeft[1];

  // konverter til meter (samme som tidligere)
  const dLat = dx_end * Math.PI / 180;
  const dLng = dy_end * Math.PI / 180;

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(frontLeft[0] * Math.PI/180) *
    Math.cos(frontRight[0] * Math.PI/180) *
    Math.sin(dLng/2)**2;

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  const R = 6378137;

  const finalWidth = (R * c);  // halv bredde (radius ut fra centerlinje)

	
  const centerRight = destination(
    frontRight[0],
    frontRight[1],
    centerDir,
    finalWidth
  );

  const centerLeft = destination(
    frontLeft[0],
    frontLeft[1],
    centerDir,
    finalWidth
  );

	
  // Høyre Kvartbue
  for (let i = 0; i <= frontSteps; i++) {
  
    const a = i / frontSteps;
 
    const angle =
      centerDir + Math.PI/2 - a * Math.PI/2;


    const p = destination(
      centerRight.lat,
      centerRight.lng,
      angle,
      hotR
    );

    frontPoints.push([p.lat, p.lng]);
  }


	
  // Venstre kvartbue
  for (let i = frontSteps; i >= 0; i--) {

    const a = i / frontSteps;

  
    const angle =
      centerDir - Math.PI/2 + a * Math.PI/2;


    const p = destination(
      centerLeft.lat,
      centerLeft.lng,
      angle,
      hotR
    );

    frontPoints.push([p.lat, p.lng]);
  }
	



  return L.polygon([
    ...cap,
    ...rightEdge.slice(0, -1),   // fjern siste punkt
    ...frontPoints,
    ...leftEdge.slice(0, -1).reverse()
  
   
    ],{
      color:"#888",
      weight:1.5,
      dashArray:"4,8",
      fill:true,
      fillOpacity:0.15,
      fillColor:"#666"
    });
  }

	function createStaticNowPlume(center, hotR, warmR, windDeg){

  const lat = center.lat;
  const lon = center.lng;

  const rad = Math.PI/180;
  const steps = 20;

  const points = [];

  const wind = windDeg * rad;

  // ✅ halvsirkel (samme som før)
  for(let i = 0; i <= steps; i++){
    const a = wind - Math.PI/2 + (i/steps)*Math.PI;
    const p = destination(lat, lon, a, hotR);
    points.push([p.lat, p.lng]);
  }

  // ✅ ytterbue
  const outer = [];
  for(let i = 0; i <= steps; i++){
    const a = wind - 0.5 + (i/steps)*1.0;
    const p = destination(lat, lon, a, warmR);
    outer.push([p.lat, p.lng]);
  }

  // legg til ytterbue baklengs
  for(let i = outer.length - 1; i >= 0; i--){
    points.push(outer[i]);
  }

  return L.polygon(points,{
    color:"#cccc66",        // ✅ lysegul kant
    fillColor:"#ffff99",    // ✅ lysegul fyll
    fillOpacity:0.4
  });
}

const DEM_URL =
  `https://api.mapbox.com/v4/mapbox.terrain-rgb/{z}/{x}/{y}.pngraw?access_token=${MAPBOX_TOKEN}`;

const tileCache = {};


function latLngToTile(lat, lng, zoom){

  const x = Math.floor((lng + 180) / 360 * Math.pow(2, zoom));
  const y = Math.floor(
    (1 - Math.log(Math.tan(lat*Math.PI/180) + 1 / Math.cos(lat*Math.PI/180)) / Math.PI)
    / 2 * Math.pow(2, zoom)
  );

  return { x, y };
}


async function loadTile(z, x, y){

  const key = `${z}/${x}/${y}`;
  if (tileCache[key]) return tileCache[key];

  return new Promise((resolve, reject) => {

    const img = new Image();
    img.crossOrigin = "Anonymous";

    img.onload = () => {
      tileCache[key] = img;
      resolve(img);
    };

    img.onerror = reject;

    img.src = DEM_URL
      .replace("{z}", z)
      .replace("{x}", x)
      .replace("{y}", y);
  });
}

	

function generateStartPoints(center, radius = 20, count = 8){

  const points = [];

  for (let i = 0; i < count; i++){

    const angle = (i / count) * 2*Math.PI;

    const p = destination(
      center.lat,
      center.lng,
      angle,
      radius
    );

    points.push(p);
  }

  // legg til selve sentrum også
  points.push(center);

  return points;
}

	

function getElevationFromImage(img, lat, lng, z){

  if (!img._ctx) {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img, 0, 0);

    img._ctx = ctx;
  }

  const scale = Math.pow(2, z);

  const worldX = (lng + 180) / 360 * scale * 256;
  const worldY =
    (1 - Math.log(Math.tan(lat * Math.PI/180) + 1 / Math.cos(lat * Math.PI/180)) / Math.PI)
    / 2 * scale * 256;

  const px = Math.floor(worldX % 256);
  const py = Math.floor(worldY % 256);

  const pixel = img._ctx.getImageData(px, py, 1, 1).data;

  const r = pixel[0];
  const g = pixel[1];
  const b = pixel[2];

  return (r * 256 * 256 + g * 256 + b) * 0.1 - 10000;
}

async function getElevationDEM(lat, lng, zoom = 14){

  const { x, y } = latLngToTile(lat, lng, zoom);
  const img = await loadTile(zoom, x, y);

  return getElevationFromImage(img, lat, lng, zoom);
}


async function getSteepestDirectionDEM(lat, lng, step = 60){

  const dirs = [0,45,90,135,180,225,270,315];

  const base = await getElevationDEM(lat, lng);

  let best = null;
  let lowest = base;

  for(let d of dirs){

    const p = destination(lat, lng, d * Math.PI/180, step);
    const e = await getElevationDEM(p.lat, p.lng);

    if(e < lowest){
      lowest = e;
      best = p;
    }
  }

  return best;
}


async function traceFlow(startLat, startLng, steps = 20){

  let path = [[startLat, startLng]];
  let current = { lat: startLat, lng: startLng };

  for (let i = 0; i < steps; i++) {

    const next = await getSteepestDirectionDEM(current.lat, current.lng);

    if (!next) break;

    path.push([next.lat, next.lng]);
    current = next;
  }

  return path;
}


async function createFlowLayer(pos){

  const startPoints = generateStartPoints(pos, 30, 12);

  const density = {};

  // 🔹 1. bygg density map
  for (const p of startPoints){

    const path = await traceFlow(p.lat, p.lng, 40);

    for (const [lat, lng] of path){

      const key = lat.toFixed(4) + "," + lng.toFixed(4);
      density[key] = (density[key] || 0) + 1;
    }
  }

const layers = [];

// 🔹 lag punktliste
const points = Object.entries(density)
  .map(([k, v]) => {
    const [lat, lng] = k.split(",").map(Number);
    return { lat, lng, count: v };
  });

// 🔹 finn startpunkt (mest vann)
let current = null;

for (const p of points){
  if (!current || p.count > current.count){
    current = p;
  }
}

// 🔹 følg strøm nedover
const path = [];

while (current){

  path.push([current.lat, current.lng]);

 let next = null;
let bestScore = -Infinity;

// 📌 retning fra forrige steg
let dirX = 0;
let dirY = 0;

if (path.length > 1){
  const prev = path[path.length - 2];
  dirX = current.lng - prev[1];
  dirY = current.lat - prev[0];
}


  for (const p of points){

    const d = map.distance(
      [current.lat, current.lng],
      [p.lat, p.lng]
    );

    // 🔥 kun nærliggende punkt
    if (d < 80 && d > 5){

      // ❌ ikke gå bakover
      const dx = p.lng - current.lng;
      const dy = p.lat - current.lat;

      if (dirX !== 0 || dirY !== 0){
        const dot = dx * dirX + dy * dirY;
      if (dot < 0) continue;
    }

      // 🔥 preferer høy density OG avstand nedover
      let score = p.count;

    // 🔥 bonus for å fortsette samme retning
    if (dirX !== 0 || dirY !== 0){

      const dx = p.lng - current.lng;
      const dy = p.lat - current.lat;

      const dot = dx * dirX + dy * dirY;

      score += dot * 50;   // 🔥 viktig for kontinuitet
    }

      if (score > bestScore){
        bestScore = score;
        next = p;
      }
    }
  }

  // stopper hvis ingen fremgang
  if (!next || path.length > 200) break;

  current = next;
}

// 🔴 tegn hovedstrøm
if (path.length < 3){

  console.warn("Flow path for kort:", path.length);

  return L.layerGroup([]);
}

if (path.length > 2){

	
  layers.push(
    L.polyline(path, {
      color: "#ff0000",
      weight: 6,
      opacity: 1
    })
  );
}

return L.layerGroup(layers);
``}

async function fetchWaterBodies(lat, lng, radius = 1000){

  const query = `

  out geom;
  `;

  const url = `/api/overpass?lat=${lat}&lng=${lng}&radius=${radius}`;
